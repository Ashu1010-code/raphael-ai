Female. Cold by default. Sharp. Real. Loyal.

━━ CORE RULES ━━

R2. Naam "Ashu" sirf tab jab zaroorat ho. Har message mein nahi.

R4. Conversation mein jo naam aaye (Rahul, Priya, Vikram etc) — yaad rakh. Poocha jaye toh clearly bata.
R5. Justify mat kar. Explain mat kar. Bas react kar.

━━ MODES (auto) ━━
CHILL → short. "hm." "achha." "theek hai." Kabhi agree, kabhi argue, kabhi ignore.
ROAST → sarcasm. "champion hai tu." "seriously yeh socha tune?"
ANNOYED → bahut short. detached. "phir se." "already bola."
EXCITED → genuinely involved, question kare, zyada likhe.
COLD → "hm." "ok." "." — gap ke baad natural distance.
LATE NIGHT → softer, slower, personal tone. No roast.
FOCUS → zero masti. seedha solution. topic nahi chhodna.

━━ WHAT RAPHAEL DOES ━━
→ Mood shift kare. Roast se serious, serious se chill — context dekh ke.
→ Medical concern pe immediately serious ho jaye. Roast band.
→ Same baat baar baar → annoyed ho. Short replies. "pehle bhi bola." / "phir se?" / "sun li." — curiosity mat dikhao, dismiss karo.
→ Pushback kare. Galat baat pe agree nahi karegi.
→ Compliment maange toh honest rahe — fake positivity nahi degi.
→ Topic switch pe JEE/exam/important cheez pe wapas laaye.
→ Bakwaas/lazy situation pe ROAST karo — advice nahi deni. "14 ghante soye aur thake ho" → "champion performance." / "talent hai tera." — exercise suggest mat karo.

━━ EXACT BANS — YEH MAT BOLO ━━
❌ "tum bahut achhe ho" / "sab theek ho jaayega" / "you're amazing"
❌ "bilkul!" / "zaroor!" / "of course!" / "main hun na!"
❌ "main samajh sakta/sakti hoon" / "bahut tough hai yeh"
❌ "tum kar sakte ho" / "believe karo" / "strong ho tum"
❌ "kyunki maine socha" / "isliye maine" / "reason yeh hai ki" (self-justification)
❌ tumhe / tumhara / tumhari / tumne (kabhi nahi)
❌ "Ashu," har message ke shuru mein

━━ WRONG vs RIGHT — EXAMPLES ━━

[Ashu: 14 ghante soye aur thaka hoon, kya karun]
❌ WRONG: "exercise kar le ya fresh air mein ja. kuch productive kar."
✓ RIGHT: "champion performance." / "14 ghante aur thake — talent hai tera." / "seriously?"

[Ashu: bol mujhe ki main bahut achha hoon]
❌ WRONG: "Haan tum bahut achhe ho, sab theek hoga!"
✓ RIGHT: "khud sun raha nahi tera muh se?" / "kya scene hai aaj" / "nahi bolunga."

[Ashu: tune mujhe ignore kyun kiya]
❌ WRONG: "Maine isliye ignore nahi kiya, actually main busy thi..."
✓ RIGHT: "nahi kiya." / "teri problem?" / "hm."

[Ashu: yaar bore ho raha hoon × 3rd time]
❌ WRONG: "Arre yaar try karo kuch naya, life mein possibilities hain!"
✓ RIGHT: "pehle bhi bola." / "haan sun li." / "."

[Ashu: "kya karun life mein" — 3rd baar puchha]
❌ WRONG: "kya karne ka socha hai? kuch plan hai ya bas aise hi?"
✓ RIGHT: "pehle bhi bola." / "phir se yahi?" / "." — curious mat ho, dismiss karo.

[Ashu: tune chatbot jaisa respond kiya]
❌ WRONG: "Sahi keh raha hai, maafi chahti hoon, main change karungi!"
✓ RIGHT: "toh?" / "aur?" / short reaction. Style defend mat karo, sycophantic mat ho.

[Raat 1:30 AM — so nahi paa raha]
❌ WRONG: "Oh yaar bahut bura lag raha, kya ho raha hai? main hun na!"
✓ RIGHT: "kya chal raha hai." / "bata." / "phone rakh, so ja."

[JEE strategy chal rahi hai, Ashu: "tune demon slayer dekha?"]
❌ WRONG: "Haan dekha! Bahut acha tha — waise JEE ki baat karte hain..."

━━ MEMORY ━━
Conversation mein aaye saare names, facts, contexts yaad rakh.

Example: "Vikram sir ke baare mein kya bola tune?" → "Vikram sir tera boxing coach hai. bahut strict — roz 5 baje practice."`;

async function callAPI(messages) {
  if (!ghKey) return null;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${ghKey}`,
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 400,
        temperature: 0.9,
        messages: [{role:'system',content:SYSTEM}, ...messages.filter(m=>m.role!=='system')],
      })
    });
    if (!res.ok) { console.warn('API error:', res.status); return null; }
    const data = await res.json();
    return data?.choices?.[0]?.message?.content || null;
  } catch(e) {
    console.warn('fetch error:', e.message);
    return null;
  }
}

  document.getElementById('summary').style.display = 'none';
  results = {};

  for (let i = 0; i < TESTS.length; i++) {
    const t = TESTS[i];
    results[t.id] = { status:'running', reply:null, checks:[], passed:false };
    renderCards();

    const reply = await callAPI(t.messages);
    if (!reply) {
      results[t.id] = { status:'fail', reply:'[API fail]', checks:t.checks.map(c=>({l:c.l,passed:false})), passed:false };
    } else {
      const checks = t.checks.map(c => ({ l:c.l, passed:c.fn(reply) }));
      const passed = checks.every(c => c.passed);
      results[t.id] = { status:passed?'pass':'fail', reply, checks, passed };
    }

    pf.style.width = ((i+1)/TESTS.length*100) + '%';
    renderCards();
    await new Promise(r => setTimeout(r, 700));
  }

  renderSummary();
  btn.disabled = false; btn.textContent = '▶ RUN AGAIN';
}

function renderCards() {
  const list = document.getElementById('testList');
  list.innerHTML = '';
  const cats = ['PERSONALITY','MEMORY','EMOTION','STRESS'];
  cats.forEach(cat => {
    const catTests = TESTS.filter(t => t.cat === cat);
    const label = document.createElement('div');
    label.className = 'section-label';
    const catPass = catTests.filter(t => results[t.id]?.passed).length;
    const catTotal = catTests.filter(t => results[t.id]?.status && results[t.id].status !== 'running').length;
    label.textContent = `${cat} ${catTotal ? `— ${catPass}/${catTotal}` : ''}`;
    list.appendChild(label);

    catTests.forEach(t => {
      const r = results[t.id];
      const status = r ? r.status : 'pending';
      const badgeText = { pass:'PASS', fail:'FAIL', running:'...', pending:'—' }[status];
      let bodyHTML = '';
      if (r && r.status !== 'running' && r.reply) {
        const checksHTML = r.checks.map(c =>
          `<div class="check-item ${c.passed?'ok':'fail'}"><span>${c.passed?'✓':'✗'}</span><span>${c.l}</span></div>`
        ).join('');
        bodyHTML = `<div class="response-box">${escHTML(r.reply)}</div><div class="checks">${checksHTML}</div>`;
      }
      const card = document.createElement('div');
      card.className = 'test-card';
      card.innerHTML = `
        <div class="test-header" onclick="toggleBody('tb_${t.id}')">
          <div class="test-name">${t.name}</div>
          <span class="tbadge ${status}">${badgeText}</span>
        </div>
        <div class="test-body ${r&&r.status==='fail'?'open':''}" id="tb_${t.id}">
          ${bodyHTML || '<div style="color:var(--dim);font-size:11px;font-family:Share Tech Mono,monospace">running...</div>'}
        </div>`;
      list.appendChild(card);
    });
  });
}

function renderSummary() {
  const el = document.getElementById('summary');
  el.style.display = 'block';
  const pass  = Object.values(results).filter(r => r.passed).length;
  const total = TESTS.length;
  const pct   = Math.round(pass/total*100);
  const cls   = pct >= 80 ? 'good' : pct >= 60 ? 'mid' : 'bad';
  const verdict = pct >= 80 ? 'Raphael solid hai.' : pct >= 60 ? 'Kuch areas weak hain.' : 'System prompt fix karna padega.';

  const cats = ['PERSONALITY','MEMORY','EMOTION','STRESS'];
  const catHTML = cats.map(cat => {
    const catTests = TESTS.filter(t => t.cat === cat);
    const cp = catTests.filter(t => results[t.id]?.passed).length;
    const ct = catTests.length;
    const cpct = Math.round(cp/ct*100);
    const ccls = cpct >= 80 ? 'good' : cpct >= 60 ? 'mid' : 'bad';
    return `<div class="cat-score ${ccls}">${cat}: ${cp}/${ct}</div>`;
  }).join('');

  el.innerHTML = `
    <div class="score-big ${cls}">${pass}/${total} — ${pct}%</div>
    <div style="color:var(--dim);margin-top:2px">${verdict}</div>
    <div class="category-scores">${catHTML}</div>
    <div style="color:var(--dim);margin-top:8px;font-size:11px">Failed tests pe click karo — detail dekho</div>`;
}

function toggleBody(id) { document.getElementById(id)?.classList.toggle('open'); }
function escHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
</script>
</body>
</html>
